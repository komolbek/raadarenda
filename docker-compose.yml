version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/4event
      - NODE_ENV=production
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change-me-in-production}
      - ENABLE_TEST_AUTH=${ENABLE_TEST_AUTH:-false}
      - SMS_PROVIDER=${SMS_PROVIDER:-mock}
      - SMS_GATEWAY_URL=${SMS_GATEWAY_URL:-}
      - SMS_GATEWAY_API_KEY=${SMS_GATEWAY_API_KEY:-}
      - ESKIZ_API_TOKEN=${ESKIZ_API_TOKEN:-}
      - UPLOADTHING_TOKEN=${UPLOADTHING_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://api:4000/api
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: http://api:4000/api
    ports:
      - '3001:3001'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=4event
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
